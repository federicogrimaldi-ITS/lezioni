spring.application.name=budget-personale

# --- Database H2 (file-based, cosi' i dati persistono tra i riavvii) ---
spring.datasource.url=jdbc:h2:file:./data/budgetdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Console H2 disponibile su /h2-console (utente: sa, password vuota)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Upload file (ricevute) ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

server.port=8080
