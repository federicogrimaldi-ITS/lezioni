<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Budget Personale</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card auth-card">
        <h1>Accedi</h1>

        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" required>
            </div>
            <button type="submit" class="btn">Accedi</button>
        </form>

        <p class="small-text">Non hai un account? <a th:href="@{/register}">Registrati qui</a></p>
        <p class="small-text">Utenti demo: giovanni@example.com / maria@example.com / luca@example.com — password: password123</p>
    </div>
</div>
</body>
</html>
